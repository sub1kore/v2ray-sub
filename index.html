<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V2Ray Subscription</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="background"></div>

<div class="container">

    <div class="card">

        <div class="logo">
            🚀
        </div>

        <h1>V2Ray Subscription</h1>

        <p class="subtitle">
            Premium VPN Nodes
        </p>

        <div class="status">
            <span class="dot"></span>
            Online
        </div>

        <div class="stats">

            <div class="box">
                <h2>186</h2>
                <span>Nodes</span>
            </div>

            <div class="box">
                <h2>12</h2>
                <span>Countries</span>
            </div>

            <div class="box">
                <h2>26 Jun</h2>
                <span>Updated</span>
            </div>

        </div>

        <div class="qr">

            QR CODE

        </div>

        <div class="buttons">

            <button class="copy">
                Copy Subscription
            </button>

            <button class="download">
                Download
            </button>

        </div>

    </div>

</div>

</body>

</html>
